<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotocheck - Personal Dengue</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="contenedor">
        <!-- Tarjeta de Fotocheck -->
        <div id="fotocheck" class="fotocheck oculto">
            <div class="cabecera">
                <h2>Campaña Contra el Dengue</h2>
                <p>Identificación Oficial</p>
            </div>
            <div class="cuerpo">
                <!-- Usaremos una API gratuita (ui-avatars) para generar una foto con sus iniciales -->
                <img id="foto" src="" alt="Foto de perfil">
                <h3 id="nombreCompleto">Cargando...</h3>
                
                <p class="etiqueta">Cargo</p>
                <p id="cargo" class="valor">-</p>
                
                <p class="etiqueta">Profesión</p>
                <p id="profesion" class="valor">-</p>
                
                <p class="etiqueta">Brigada / Grupo</p>
                <p id="grupo" class="valor">-</p>
                
                <p class="etiqueta">DNI</p>
                <p id="dni" class="valor">-</p>
            </div>
            <div class="pie">
                <p id="vigencia">Válido para el año 2026</p>
            </div>
        </div>

        <!-- Mensaje de Error -->
        <div id="error" class="error oculto">
            <h2>Persona no encontrada</h2>
            <p>El código QR escaneado no coincide con ningún registro activo o la URL es inválida.</p>
        </div>
    </div>

    <script>
        // Obtener el DNI que viene de la URL del QR escaneado (ej: ?id=76124515)
        const urlParams = new URLSearchParams(window.location.search);
        const idBuscado = urlParams.get('id');

        if (!idBuscado) {
            mostrarError();
        } else {
            cargarDatos(idBuscado);
        }

        async function cargarDatos(id) {
            try {
                // Descarga los datos de la "base de datos" estática (el JSON)
                const response = await fetch('datos.json');
                const datos = await response.json();
                
                // Busca al empleado por su DNI
                const persona = datos.find(p => p.DNI === id);
                
                if (persona) {
                    mostrarFotocheck(persona);
                } else {
                    mostrarError();
                }
            } catch (error) {
                console.error('Error cargando los datos:', error);
                mostrarError();
            }
        }

        function mostrarFotocheck(persona) {
            const nombres = persona['NOMBRE Y APELLIDOS'];
            // Generar un avatar con las iniciales de la persona
            const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(nombres)}&background=random&size=150&color=fff`;
            
            document.getElementById('foto').src = avatarUrl;
            document.getElementById('nombreCompleto').textContent = nombres;
            document.getElementById('cargo').textContent = persona.CARGO;
            document.getElementById('profesion').textContent = persona['PROFESIÓN'] || '-';
            document.getElementById('grupo').textContent = persona.GRUPO;
            document.getElementById('dni').textContent = persona.DNI;
            
            if (persona.VIGENCIA) {
                document.getElementById('vigencia').textContent = persona.VIGENCIA;
            }

            document.getElementById('fotocheck').classList.remove('oculto');
        }

        function mostrarError() {
            document.getElementById('error').classList.remove('oculto');
        }
    </script>
</body>
</html>
